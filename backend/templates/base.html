<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoredGames</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    nav { background: #111827; color: #fff; padding: 12px 20px; display: flex; gap: 14px; flex-wrap: wrap; }
    nav a { color: #fff; text-decoration: none; font-weight: 600; }
    .container { max-width: 1000px; margin: 20px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); margin-bottom: 14px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    input, textarea, select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; margin-top: 4px; }
    button { background: #2563eb; color: #fff; border: none; padding: 10px 14px; border-radius: 6px; cursor: pointer; }
    .muted { color: #6b7280; }
    .pill { display: inline-block; background: #e5e7eb; border-radius: 999px; padding: 4px 10px; margin: 2px; font-size: 12px; }
    .messages { list-style: none; padding: 0; }
    .messages li { background: #dcfce7; border: 1px solid #86efac; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">BoredGames</a>
    <a href="/browse/">Browse</a>
    {% if request.user.is_authenticated %}
      <a href="/listings/new/">New Listing</a>
      <a href="/profile/me/">My Profile</a>
      <a href="/inbox/">Inbox</a>
      <a href="/logout/">Logout</a>
    {% else %}
      <a href="/signup/">Sign Up</a>
      <a href="/login/">Login</a>
    {% endif %}
  </nav>
  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
